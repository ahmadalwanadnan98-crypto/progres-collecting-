<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>M1 Collection Progress</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:15px;
}

.card{
background:#222;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:5px;
box-sizing:border-box;
}

button{
padding:10px;
margin:5px;
width:48%;
}

h2,h3{
margin:5px 0;
}
</style>

</head>
<body>

<h2>M1 COLLECTION PROGRESS</h2>

<select id="mode">
<option value="collecting">Update Actual Terkini All Zone</option>
<option value="loading">Update Actual Loading Terkini All Zone</option>
</select>

<br><br>

<label>
<input type="checkbox" id="use12hq">
 Gunakan Area 12HQ
</label>

<div id="zones"></div>

<div id="hqSection" style="display:none">

<h3>12HQ</h3>

<div class="card">
BB
<textarea id="bb"></textarea>
NF <input id="bb_nf" value="0">
LS <input id="bb_ls" value="0">
</div>

<div class="card">
BC
<textarea id="bc"></textarea>
NF <input id="bc_nf" value="0">
LS <input id="bc_ls" value="0">
</div>

<div class="card">
BD
<textarea id="bd"></textarea>
NF <input id="bd_nf" value="0">
LS <input id="bd_ls" value="0">
</div>

<div class="card">
BE
<textarea id="be"></textarea>
NF <input id="be_nf" value="0">
LS <input id="be_ls" value="0">
</div>

</div>

<button onclick="copyText()">COPY</button>
<button onclick="exportWA()">WHATSAPP</button>

<script>

const zones = [
"AA","AB","AC","AD",
"BA",
"CA","CB","CC","CD",
"DA","DB","DC","DD",
"GG"
];

const div = document.getElementById("zones");

zones.forEach(z=>{

div.innerHTML += `
<div class="card">

<b>${z}</b>

<select id="status_${z}">
<option>on hand</option>
<option>on proses</option>
<option>done collect</option>
<option>done loading</option>
</select>

IB
<input id="ib_${z}" type="number">

NF
<input id="nf_${z}" value="0">

LS
<input id="ls_${z}" value="0">

</div>
`;

});

document
.getElementById("use12hq")
.addEventListener("change",function(){

document
.getElementById("hqSection")
.style.display =
this.checked ? "block":"none";

});

function nowTime(){

let d = new Date();

return d.getHours().toString().padStart(2,"0")
+ ":"
+ d.getMinutes().toString().padStart(2,"0");

}

function zoneLine(z){

let status =
document.getElementById("status_"+z).value;

let ib =
document.getElementById("ib_"+z).value;

let nf =
document.getElementById("nf_"+z).value;

let ls =
document.getElementById("ls_"+z).value;

if(status=="on hand"){

return `${z}. on hand | NF ${nf} | LS ${ls}`;

}

if(status=="on proses"){

return `${z}. ${ib} on proses | NF ${nf} | LS ${ls}`;

}

if(status=="done collect"){

return `${z}. done collect ${nowTime()} | NF ${nf} | LS ${ls}`;

}

if(status=="done loading"){

return `${z}. done loading ${nowTime()} | NF ${nf} | LS ${ls}`;

}

}

function generateText(){

let d = new Date();

let txt = "";

txt += d.getDate()+" "
+ d.toLocaleString('id-ID',{month:'long'})
+ " "
+ d.getFullYear();

txt += "\n";

if(
document.getElementById("mode").value
=="collecting"
){

txt +=
"Update Actual Terkini All Zone Pukul "
+ nowTime();

}else{

txt +=
"Update Actual Loading Terkini All Zone Pukul "
+ nowTime();

}

txt += "\n\n";

txt += zoneLine("AA")+"\n";
txt += zoneLine("AB")+"\n";
txt += zoneLine("AC")+"\n";
txt += zoneLine("AD")+"\n\n";

txt += zoneLine("BA")+"\n\n";

txt += zoneLine("CA")+"\n";
txt += zoneLine("CB")+"\n";
txt += zoneLine("CC")+"\n";
txt += zoneLine("CD")+"\n\n";

txt += zoneLine("DA")+"\n";
txt += zoneLine("DB")+"\n";
txt += zoneLine("DC")+"\n";
txt += zoneLine("DD")+"\n\n";

txt += zoneLine("GG")+"\n";

if(
document.getElementById("use12hq").checked
){

txt += "\n\n12HQ\n\n";

["bb","bc","bd","be"].forEach(x=>{

txt +=
x.toUpperCase()
+". "
+document.getElementById(x).value
+" | NF "
+document.getElementById(x+"_nf").value
+" | LS "
+document.getElementById(x+"_ls").value
+"\n";

});

}

return txt;

}

function copyText(){

navigator.clipboard.writeText(
generateText()
);

alert("Berhasil dicopy");

}

function exportWA(){

window.open(
"https://wa.me/?text="
+ encodeURIComponent(generateText())
);

}

</script>

</body>
</html>
