<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M1 Collection Progress</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:10px;
}

.zone{
border:1px solid #ddd;
padding:10px;
border-radius:8px;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
box-sizing:border-box;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
}

textarea{
width:100%;
height:350px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>M1 Collection Progress V5</h2>

<label>Mode Update</label>
<select id="mode">
<option>Update Actual Terkini All Zone</option>
<option>Update Actual Loading Terkini All Zone</option>
</select>

<br><br>

<label>Jam Update</label>
<input type="time" id="jamUpdate">

<br><br>

<label>
<input type="checkbox" id="showHQ">
 Gunakan Area 12HQ
</label>

</div>

<div class="card">

<h3>Zona Utama</h3>

<div class="grid" id="mainZones"></div>

</div>

<div class="card" id="hqCard" style="display:none">

<h3>12HQ</h3>

<div class="grid" id="hqZones"></div>

</div>

<div class="card">

<button onclick="generateText()">Generate</button>
<button onclick="copyText()">Copy</button>
<button onclick="exportWA()">Export WhatsApp</button>

<textarea id="output"></textarea>

</div>

</div>

<script>

const zones = [
"AA","AB","AC","AD",
"BA",
"CA","CB","CC","CD",
"DA","DB","DC","DD",
"GG"
];

const hqZones = ["BB","BC","BD","BE"];

const mainDiv = document.getElementById("mainZones");

zones.forEach(z=>{

mainDiv.innerHTML += `
<div class="zone">

<b>${z}</b>

<select id="status_${z}">
<option>on proses</option>
<option>on hand</option>
<option>done collect</option>
<option>done loading</option>
</select>

<input id="ib_${z}" placeholder="IB / Sisa IB">

<input id="jam_${z}" placeholder="Jam manual contoh 11:30">

<input id="nf_${z}" type="number" value="0" placeholder="NF">

<input id="ls_${z}" type="number" value="0" placeholder="LS">

</div>
`;

});

const hqDiv = document.getElementById("hqZones");

hqZones.forEach(z=>{

hqDiv.innerHTML += `
<div class="zone">

<b>${z}</b>

<input id="ket_${z}" placeholder="Keterangan">

<input id="nfhq_${z}" value="0">

<input id="lshq_${z}" value="0">

</div>
`;

});

document.getElementById("showHQ").addEventListener("change",function(){

document.getElementById("hqCard").style.display =
this.checked ? "block" : "none";

});

function generateText(){

const now = new Date();

const bulan = [
"Januari","Februari","Maret","April",
"Mei","Juni","Juli","Agustus",
"September","Oktober","November","Desember"
];

let tanggal =
now.getDate() + " " +
bulan[now.getMonth()] + " " +
now.getFullYear();

let mode =
document.getElementById("mode").value;

let jamUpdate =
document.getElementById("jamUpdate").value;

let txt = "";

txt += tanggal + "\n\n";
txt += mode + " Pukul " + jamUpdate + "\n\n";

function buildZone(z){

let status =
document.getElementById("status_"+z).value;

let ib =
document.getElementById("ib_"+z).value;

let jam =
document.getElementById("jam_"+z).value;

let nf =
document.getElementById("nf_"+z).value || 0;

let ls =
document.getElementById("ls_"+z).value || 0;

if(mode.includes("Loading")){

return z + ". " + (ib || 0) + " IB";

}

if(status=="on proses"){
return z + ". " + ib +
" on proses | NF " + nf +
" | LS " + ls;
}

if(status=="on hand"){
return z + ". on hand | NF " +
nf + " | LS " + ls;
}

if(status=="done collect"){
return z + ". done collect " +
jam + " | NF " + nf +
" | LS " + ls;
}

if(status=="done loading"){
return z + ". done loading " +
jam + " | NF " + nf +
" | LS " + ls;
}

}

txt += buildZone("AA")+"\n";
txt += buildZone("AB")+"\n";
txt += buildZone("AC")+"\n";
txt += buildZone("AD")+"\n\n";

txt += buildZone("BA")+"\n\n";

txt += buildZone("CA")+"\n";
txt += buildZone("CB")+"\n";
txt += buildZone("CC")+"\n";
txt += buildZone("CD")+"\n\n";

txt += buildZone("DA")+"\n";
txt += buildZone("DB")+"\n";
txt += buildZone("DC")+"\n";
txt += buildZone("DD")+"\n\n";

txt += buildZone("GG")+"\n";

if(document.getElementById("showHQ").checked){

txt += "\n\n12HQ\n\n";

hqZones.forEach(z=>{

let ket =
document.getElementById("ket_"+z).value;

let nf =
document.getElementById("nfhq_"+z).value;

let ls =
document.getElementById("lshq_"+z).value;

txt +=
z + ". " + ket +
" | NF " + nf +
" | LS " + ls + "\n";

});

}

document.getElementById("output").value = txt;

}

function copyText(){

generateText();

navigator.clipboard.writeText(
document.getElementById("output").value
);

alert("Berhasil dicopy");

}

function exportWA(){

generateText();

let text =
document.getElementById("output").value;

window.open(
"https://wa.me/?text=" +
encodeURIComponent(text)
);

}

</script>

</body>
</html>
